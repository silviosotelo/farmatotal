name: Deploy to Demo

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy platform → demo server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar archivos platform/ al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "platform/"
          target: "/home/soporte/farmatotal"
          strip_components: 1

      - name: Rebuildar y reiniciar contenedores Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/soporte/farmatotal
            docker compose -f docker-compose.demo.yml build store admin api
            docker compose -f docker-compose.demo.yml up -d
