name: Deploy to Demo

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy platform → server .34
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync platform/ y rebuildar Docker
        run: |
          rsync -av --delete --exclude='.env*' --exclude='cloudflared/' $GITHUB_WORKSPACE/platform/ /home/soporte/farmatotal/
          cd /home/soporte/farmatotal
          docker build --no-cache -t ft-base -f Dockerfile.base .
          docker compose -f docker-compose.demo.yml build --no-cache store admin api
          docker compose -f docker-compose.demo.yml up -d
